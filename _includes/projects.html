<section id="projects" class="py-5">
    <div class="container">
    <h2 class="mb-5 text-center">Projects</h2>
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        {% for project in site.data.projects %}
        {% include project_card.html project=project %}
        {% endfor %}
        
        <div class="col">
            <div class="card h-100 shadow-sm border-dashed">
                <div class="card-body d-flex flex-column align-items-center justify-content-center text-center text-muted">
                    <i class="bi bi-tools fs-1 mb-2"></i>
                    <h5 class="card-title">More to come...</h5>
                    <p class="card-text">Exciting new projects are currently in the works!</p>
                </div>
            </div>
        </div>

    </div>
</section>
