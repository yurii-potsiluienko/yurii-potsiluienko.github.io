<div class="col">
  <div class="card h-100 shadow-sm">
    <img src="{{ project.img }}" class="card-img-top project-card-img" alt="{{ project.alt }}">
    <div class="card-body d-flex flex-column">
      <h5 class="card-title">{{ project.title }}</h5>
      <div class="mb-3 d-flex flex-wrap gap-1">
        {% for badge in project.badges %}
          <span class="badge bg-primary bg-opacity-10 text-primary border border-primary-subtle">{{ badge }}</span>
        {% endfor %}
      </div>
      <p class="card-text text-muted">{{ project.description }}</p>
      <a href="{{ project.link }}" target="_blank" class="btn btn-outline-primary mt-auto">Learn more <i class="bi bi-box-arrow-up-right"></i></a>
    </div>
  </div>
</div>
