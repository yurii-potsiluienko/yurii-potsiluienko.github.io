<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Personal website of Yurii Potsiluienko, an Electrical Engineering student.">
        <title>{{ page.title }}</title>
        <link rel="icon" href="/static/img/YP_favicon.png" sizes="16x16" type="image/png">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css">
        <link rel="stylesheet" href="/static/styles.css">
    </head>
    <body>

        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <img src="/static/img/YP_logo.png" alt="YP" class="logo" height="32" width="32"> 
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="#about">About Me</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#skills">Skills</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#projects">Projects</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#resume">Resume</a>
                        </li>
                        <li class="nav-item">
                            <button id="theme-toggle" class="btn btn-sm btn-outline-secondary ms-2">
                                <i id="theme-icon" class="bi bi-moon"></i>
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Page content goes here -->
        {{ content }}
        
        <!-- Footer -->
        <footer>
            <p class="text-center">© <span id="current-year"></span> Yurii Potsiluienko. All rights reserved.</p>
        </footer>

        <!-- Scripts -->
        <script>
            document.getElementById('current-year').textContent = new Date().getFullYear();
        </script>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const btn = document.getElementById('theme-toggle');
                const icon = document.getElementById('theme-icon');
                const htmlElement = document.documentElement; // Targets the <html> tag

                // Set theme based on saved preference or system
                const savedTheme = localStorage.getItem('theme');
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                const isDark = savedTheme === 'dark' || (!savedTheme && prefersDark);

                // Helper function to apply the theme
                const setTheme = (dark) => {
                    htmlElement.setAttribute('data-bs-theme', dark ? 'dark' : 'light');
                    icon.className = dark ? 'bi bi-sun' : 'bi bi-moon';
                };

                // Apply the initial theme on load
                setTheme(isDark);

                // Toggle theme on button click
                btn.onclick = () => {
                    const currentTheme = htmlElement.getAttribute('data-bs-theme');
                    const newThemeIsDark = currentTheme === 'light'; 
                    
                    setTheme(newThemeIsDark);
                    localStorage.setItem('theme', newThemeIsDark ? 'dark' : 'light');
                };
            });
        </script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
        
        <script>
            // Dynamin resume link
            const myResumeUrl = "https://docs.google.com/document/d/1p-eb2I4ILUb-KOxCs1sWK034Tu-aKmW5aP1S4fLBOms/export?format=pdf";
            document.addEventListener("DOMContentLoaded", () => {
                const resumeLinks = document.querySelectorAll('.dynamic-resume-link');
                resumeLinks.forEach(link => {
                    link.href = myResumeUrl;
                });
            });
        </script>
    </body>
</html>
